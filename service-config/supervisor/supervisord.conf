[supervisord]
nodaemon=true
loglevel=warn
logfile_maxbytes=0
logfile=/dev/stderr

[program:nginx]
command = nginx -g 'daemon off;'
autostart = true
autorestart = true
startretries = 999999999999
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:php-fpm]
command=/usr/local/sbin/php-fpm -F
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr


[program:symfony-scheduler]
command=/var/www/openroaming/bin/console messenger:consume scheduler_default -vv
directory=/var/www/openroaming
autostart=true
autorestart=true
stderr_logfile=/var/log/symfony_scheduler.err.log
stdout_logfile=/var/log/symfony_scheduler.out.log
