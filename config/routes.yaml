# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# This file is the entry point to configure the routes of your app.
# Methods with the #[Route] attribute are automatically imported.
# See also https://symfony.com/doc/current/routing.html

# To list all registered routes, run the following command:
#   bin/console debug:router

controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute
nbgrp_saml:
    resource: "@NbgrpOneloginSamlBundle/Resources/config/routes.php"

app_login:
    path: /login
    controller: App\Controller\SecurityController::login

app_dashboard_login:
    path: /dashboard/login
    controller: App\Controller\SecurityController::dashboardLogin

# API V1
api_v1:
    prefix: /api/v1
    resource: '../src/Api/V1/Controller/'
    type: attribute

# API V2
api_v2:
    prefix: /api/v2
    resource: '../src/Api/V2/Controller/'
    type: attribute

# API V3
api_v3:
    prefix: /api/v3
    resource: '../src/Api/V3/Controller/'
    type: attribute
