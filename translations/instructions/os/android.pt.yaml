introduction: 'De modo a aceder de forma segura às redes OpenRoaming, deve seguir os próximos passos'
item1:
    description: "Abra o link em anexo no seu e-mail"
item2:
    description: "Selecione o métode de autenticação que pretende utilizar e aceite os termos e condições"
item3:
    description: "Insira o seus detalhes"
item4:
    description: "Toque em “Transferir e Instalar”"
item5:
    description: "Toque em “Instalar”"
item6:
    description: "Toque em “OK”"
item7:
    description: "Após finalizado o processo ficará ligado à rede OpenRoaming e poderá confirmar nas definições de Wi-Fi"
