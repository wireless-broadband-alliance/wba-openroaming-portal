title: 'Eliminação de Conta'
toast_warning: 'Está na página para eliminar permanentemente a sua conta. Esta ação não pode ser desfeita e todos os seus dados serão apagados de forma irreversível.'
account_deletion_process: 'Processo de Eliminação de Conta'
deletion_description: >
    Para prosseguir com a eliminação da conta, introduza a sua <strong class="text-red-600">palavra-passe atual</strong>.
    Se a tiver esquecido, pode verificá-la no seu <strong class="text-blue-600">e-mail de registo</strong> ou redefini-la através da opção de recuperação de palavra-passe.
    Para redefinir a sua palavra-passe, aceda a <strong class="text-blue-600">"/forgot-password/email"</strong> —
    <strong class="text-red-600">não pode estar autenticado</strong> para o fazer.

password_label: 'Palavra-passe'
password_placeholder: 'Introduza a sua palavra-passe'
confirm_label: 'Confirmo que quero eliminar permanentemente a minha conta e compreendo que esta ação não pode ser desfeita.'
code_label: 'Código'
code_placeholder: 'Introduza o seu código'
submit_button: 'Enviar'
resend_code_button: 'Reenviar código'
