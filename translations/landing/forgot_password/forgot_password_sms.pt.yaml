title: 'Assistência para Reposição de Palavra-Passe - Número de Telefone'
description: >
    Se se esqueceu da palavra-passe associada à conta do <strong>número de telefone</strong>, por favor digite-o 
    aqui para que possamos ajudar.<br><br>
    Por favor, note que tem apenas três tentativas. Se precisar enviar novamente o pedido, deverá aguardar dois 
    minutos entre cada tentativa.
